services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: reddit_accounts
      POSTGRES_USER: reddit
      POSTGRES_PASSWORD: reddit
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reddit -d reddit_accounts"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://reddit:reddit@postgres:5432/reddit_accounts
      CORS_ORIGINS: '["http://localhost:5173"]'
      REDDIT_USER_AGENT: account-management-platform/0.1
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres-data:
